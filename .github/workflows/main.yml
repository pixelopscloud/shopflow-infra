name: ShopFlow CI/CD Pipeline

on:
  push:
    branches: [dev, staging, main]

permissions:
  id-token: write
  contents: read

jobs:
  code-scan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

  build-push-scan:
    name: Build Push and Scan Images
    runs-on: ubuntu-latest
    needs: code-scan
    steps:
      - uses: actions/checkout@v3
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}
      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-frontend:${{ github.sha }} ./frontend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-frontend:${{ github.sha }}
      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-backend:${{ github.sha }}

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-push-scan
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout Infra Repo
        uses: actions/checkout@v3
        with:
          repository: pixelopscloud/shopflow-infra
          token: ${{ secrets.GH_TOKEN }}
      - name: Update Dev Image Tag
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" helm/shopflow/values-dev.yaml
          git config user.email "ci@shopflow.com"
          git config user.name "CI Bot"
          git add .
          git commit -m "ci: update dev image tag to ${{ github.sha }}"
          git push

  dast-scan:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://dev.shopflow.com' 
          fail_action: false 
