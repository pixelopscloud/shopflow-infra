name: ShopFlow CI/CD Pipeline

on:
  push:
    branches: [dev, staging, main]

permissions:
  id-token: write
  contents: write
  issues: write

jobs:
  code-scan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

  build-push-scan:
    name: Build Push and Scan Images
    runs-on: ubuntu-latest
    needs: code-scan
    steps:
      - uses: actions/checkout@v3
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}
      - name: Build and Push Images
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-frontend:${{ github.sha }} ./frontend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-frontend:${{ github.sha }}
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/shopflow-backend:${{ github.sha }}

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-push-scan
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout Infra Repo
        uses: actions/checkout@v3
        with:
          repository: pixelopscloud/shopflow-infra
          token: ${{ secrets.GH_TOKEN }}
      - name: Update Dev Tag
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" helm/shopflow/values.yaml
          git config user.email "ci@shopflow.com"
          git config user.name "CI Bot"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: update dev tag ${{ github.sha }}"
          git push

  dast-scan:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Prepare ZAP Workspace
        run: mkdir -p zap && chmod -R 777 zap
      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GH_TOKEN }}
          target: 'http://localhost:8085' # Localhost test for demo
          fail_action: false

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-push-scan
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout Infra Repo
        uses: actions/checkout@v3
        with:
          repository: pixelopscloud/shopflow-infra
          token: ${{ secrets.GH_TOKEN }}
      - name: Update Staging Tag
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" helm/shopflow/values.yaml
          git config user.email "ci@shopflow.com"
          git config user.name "CI Bot"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: update staging tag ${{ github.sha }}"
          git push

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Infra Repo
        uses: actions/checkout@v3
        with:
          repository: pixelopscloud/shopflow-infra
          token: ${{ secrets.GH_TOKEN }}
      - name: Update Prod Tag
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" helm/shopflow/values.yaml
          git config user.email "ci@shopflow.com"
          git config user.name "CI Bot"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: update prod tag ${{ github.sha }}"
          git push

  slack-notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [code-scan, build-push-scan, deploy-dev, deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Send Slack Alert
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "íş€ *ShopFlow Pipeline Status*\n*Branch:* `${{ github.ref_name }}`\n*Result:* ${{ needs.build-push-scan.result == 'success' && 'âś… Success' || 'âťŚ Failed' }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here for details>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
